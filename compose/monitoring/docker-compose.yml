# Grafana + Prometheus + exporters for Raspberry Pi (ARM64).
# Pi-hole and Nextcloud run in separate Compose projects; exporters reach them via
# host.docker.internal (published ports 8080 / 8081). Start those stacks first.
# Copy .env.example to .env before `docker compose up -d`.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus
    platform: linux/arm64
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - monitoring_net

  grafana:
    image: grafana/grafana:latest
    container_name: monitoring-grafana
    platform: linux/arm64
    ports:
      - '${GRAFANA_HTTP_PORT:-3000}:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring_net

  node_exporter:
    image: prom/node-exporter:latest
    container_name: monitoring-node-exporter
    platform: linux/arm64
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    restart: unless-stopped
    networks:
      - monitoring_net

  pihole_exporter:
    image: ekofr/pihole-exporter:latest
    container_name: monitoring-pihole-exporter
    platform: linux/arm64
    environment:
      PIHOLE_PROTOCOL: http
      PIHOLE_HOSTNAME: host.docker.internal
      PIHOLE_PORT: ${PIHOLE_API_PORT:-8080}
      PIHOLE_PASSWORD: ${PIHOLE_PASSWORD}
      PORT: '9617'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    networks:
      - monitoring_net

  nextcloud_exporter:
    image: ghcr.io/xperimental/nextcloud-exporter:latest
    container_name: monitoring-nextcloud-exporter
    platform: linux/arm64
    environment:
      NEXTCLOUD_SERVER: ${NEXTCLOUD_SERVER}
      NEXTCLOUD_AUTH_TOKEN: ${NEXTCLOUD_AUTH_TOKEN:-}
      NEXTCLOUD_USERNAME: ${NEXTCLOUD_USERNAME:-}
      NEXTCLOUD_PASSWORD: ${NEXTCLOUD_PASSWORD:-}
      NEXTCLOUD_LISTEN_ADDRESS: ':9205'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    networks:
      - monitoring_net

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring_net:
    driver: bridge
