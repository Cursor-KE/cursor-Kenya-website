# Prometheus scrape config for the homelab monitoring stack.
# Targets use Docker Compose service names on the monitoring network.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: pihole
    static_configs:
      - targets: ['pihole_exporter:9617']

  - job_name: nextcloud
    scrape_interval: 60s
    static_configs:
      - targets: ['nextcloud_exporter:9205']
